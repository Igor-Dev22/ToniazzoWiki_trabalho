<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicaLis | Dicionário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-layout">
        <nav class="main-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-book-open logo-icon-menu"></i>
                <h2>LogicaLis</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" id="nav-dictionary">
                    <i class="fas fa-home"></i> Dicionário
                </li>
                <li class="nav-item" id="nav-favorites">
                    <i class="fas fa-star"></i> Meus Favoritos
                </li>
            </ul>
        </nav>

        <div class="app-content">
            <header class="main-header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Ocultar/Mostrar Menu">
                        <i class="fas fa-chevron-left" id="toggle-icon"></i>
                    </button>
                    <div>
                        <h1>Engenharia de Software</h1>
                        <p>Use o índice A-Z e clique nos cards para ver as definições.</p>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="dark-mode-toggle" class="btn-icon" title="Alternar Modo Escuro" aria-label="Modo Escuro">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="btn-add-term" class="btn-primary" aria-label="Adicionar Termo">
                        <i class="fas fa-plus"></i> Novo Termo
                    </button>
                </div>
            </header>

            <div id="view-main" class="view-section active">
                <div class="search-container shadow-card">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Pesquisar termo..." aria-label="Pesquisar termo">
                </div>

                <div class="filter-panel shadow-card">
                    <div class="filter-header">
                        <h3>Índice e Filtros</h3>
                        <div class="filter-actions-right">
                            <select id="sort-select" class="form-input sort-select" aria-label="Ordenar por">
                                <option value="az">Ordem Alfabética (A-Z)</option>
                                <option value="recent">Mais Recentes</option>
                                <option value="views">Mais Visualizados</option>
                            </select>
                            <button id="clear-btn" class="clear-btn">Limpar Filtros</button>
                        </div>
                    </div>
                    <div class="filter-group" id="alphabet-filters">
                        <button class="filter-pill active" id="btn-todas" data-filter="Todas">Todas</button>
                    </div>
                </div>

                <div class="results-meta">
                    <span id="terms-count">0 termos encontrados</span>
                </div>

                <div id="empty-state" class="empty-state">
                    <i class="fas fa-search-minus empty-icon"></i>
                    <h2>Nenhum termo encontrado</h2>
                    <p>Não encontramos nada com a sua busca atual. Que tal cadastrar este termo?</p>
                    <button class="btn-primary" id="btn-empty-add" style="margin-top: 15px;"><i class="fas fa-plus"></i> Adicionar Termo</button>
                </div>

                <div class="terms-grid" id="terms-container"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-content shadow-card">
            <span class="close-button" tabindex="0" aria-label="Fechar">&times;</span>
            
            <div class="modal-actions" style="position: absolute; right: 60px; top: 20px; display: flex; gap: 10px;">
                <button id="btn-edit-term" class="btn-icon-small" title="Editar"><i class="fas fa-edit"></i></button>
                <button id="btn-delete-term" class="btn-icon-small danger" title="Excluir"><i class="fas fa-trash"></i></button>
            </div>

            <div id="modal-body"></div>
        </div>
    </div>

    <div id="form-modal-overlay" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-content shadow-card">
            <span class="close-form-button" tabindex="0" aria-label="Fechar">&times;</span>
            <h2 id="form-modal-title" style="color:var(--primary-color); margin-bottom:20px">Adicionar Novo Termo</h2>
            <form id="term-form">
                <input type="hidden" id="term-id">
                <input type="text" id="term-name" placeholder="Nome do Termo (Ex: React)" required class="form-input">
                <textarea id="term-desc" placeholder="Digite a descrição detalhada do termo..." required class="form-input" rows="4"></textarea>
                <input type="url" id="term-link" placeholder="Link de Referência (Opcional)" class="form-input">
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Salvar</button>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
